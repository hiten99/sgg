<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join | Community Hub</title>
    <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container" style="max-width:480px; margin:60px auto;">
        <h2>Join the Community</h2>

        <p id="auth-status" style="margin:12px 0;"></p>

        <!-- Invite banner — JS shows/hides this based on ?token= in URL -->
        <div id="invite-banner" style="display:none; background:#fff4ea; border:1.5px solid #d96c0c; border-radius:10px; padding:14px 18px; margin-bottom:20px; font-size:.9rem; color:#d96c0c;">
            <strong>You've been invited!</strong> <span id="invite-banner-text"></span>
        </div>

        <!--
            IDs connected to auth-signup.js:
              #signup-form      — form element
              #signup-fullname  — full name input
              #signup-email     — email input
              #signup-password  — password input
              #signup-submit    — submit button
              #auth-status      — status / error message
        -->
        <form id="signup-form" novalidate>

            <div class="form-group">
                <label for="signup-fullname">Full Name</label>
                <input type="text" id="signup-fullname" name="full_name" required
                       placeholder="Ravi Patel">
            </div>

            <div class="form-group">
                <label for="signup-email">Email</label>
                <input type="email" id="signup-email" name="email" required
                       placeholder="name@example.com">
            </div>

            <div class="form-group">
                <label for="signup-password">Password</label>
                <input type="password" id="signup-password" name="password" required
                       placeholder="Min 6 characters">
            </div>

            <button type="submit" id="signup-submit">Create Account</button>

            <!-- Hidden — stores invite token from URL, read by auth-signup.js -->
            <input type="hidden" id="signup-token">

        </form>

        <p style="margin-top:20px; font-size:0.9rem;">
            Already a member? <a href="/auth/login.html">Sign in</a>
        </p>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module" src="/js/main.js"></script>
    <script type="module" src="/js/pages/auth-signup.js"></script>
</body>
</html>
