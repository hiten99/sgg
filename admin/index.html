<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – User Management | Community Hub</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Font applied globally in admin */
        body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --saffron: #f4831f;
            --teal: #f4831f;
            --teal-lt: #fff4ea;
            --text-dark: #1e1e1e;
            --text-mid: #4a4a4a;
            --text-soft: #7a7a7a;
            --border: #e8e8e4;
            --bg: #fafaf8;
            --white: #ffffff;
            --red: #e53935;
            --red-lt: #ffebee;
            --green: #2e7d32;
            --green-lt: #e8f5e9;
            --blue-lt: #e3f0ff;
            --blue: #1976d2;
            --radius: 12px;
            --shadow: 0 4px 24px rgba(0,0,0,0.07);
        }

        body {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* ── Page Header ─────────────────────────────────────────────────── */
        .admin-hero {
            background: linear-gradient(135deg, #1e1e2e 0%, var(--teal) 100%);
            padding: 48px 0 36px;
            color: white;
        }

        .admin-hero-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 32px;
        }

        .admin-hero-inner h1 {
            font-size: 1.9rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 6px;
        }

        .admin-hero-inner p {
            font-size: 0.95rem;
            opacity: 0.8;
        }

        /* ── Status Bar ──────────────────────────────────────────────────── */
        #admin-status {
            font-size: 0.88rem;
            font-weight: 600;
            padding: 10px 16px;
            border-radius: 8px;
            min-height: 40px;
            line-height: 1.5;
            transition: all 0.3s;
        }

        .admin-status-info    { background: var(--blue-lt);  color: var(--blue);  }
        .admin-status-success { background: var(--green-lt); color: var(--green); }
        .admin-status-error   { background: var(--red-lt);   color: var(--red);   }
        .admin-status-        { display: none; }

        /* ── Content Shell ───────────────────────────────────────────────── */
        .admin-content {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 32px 80px;
        }

        /* ── Toolbar (search + count) ────────────────────────────────────── */
        .admin-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-wrap {
            position: relative;
            flex: 1;
            max-width: 340px;
        }

        .search-wrap svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-soft);
            pointer-events: none;
        }

        #admin-search-input {
            width: 100%;
            padding: 11px 14px 11px 42px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.9rem;
            background: var(--white);
            outline: none;
            transition: border-color 0.2s;
        }

        #admin-search-input:focus {
            border-color: var(--teal);
        }

        .member-count {
            font-size: 0.85rem;
            color: var(--text-soft);
            font-weight: 500;
            white-space: nowrap;
        }

        /* ── Table Card ──────────────────────────────────────────────────── */
        .table-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        #admin-user-table {
            width: 100%;
            border-collapse: collapse;
        }

        #admin-user-table thead tr {
            background: #f5f5f3;
        }

        #admin-user-table th {
            text-align: left;
            padding: 13px 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-soft);
            border-bottom: 1px solid var(--border);
        }

        #admin-user-table td {
            padding: 14px 20px;
            font-size: 0.9rem;
            border-bottom: 1px solid #f0f0ed;
            color: var(--text-mid);
        }

        #admin-user-table tbody tr {
            transition: background 0.15s;
        }

        #admin-user-table tbody tr:hover {
            background: #fafaf8;
        }

        #admin-user-table tbody tr:last-child td {
            border-bottom: none;
        }

        /* ── Role Badges ─────────────────────────────────────────────────── */
        .role-badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 50px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .role-admin   { background: #fff4ea; color: var(--saffron); }
        .role-member  { background: var(--teal-lt); color: var(--teal); }
        .role-deleted { background: #f5f5f5; color: #999; }

        /* ── Action Buttons ──────────────────────────────────────────────── */
        .btn-action {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 14px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-edit {
            background: var(--blue-lt);
            color: var(--blue);
            margin-right: 6px;
        }

        .btn-edit:hover {
            background: var(--blue);
            color: white;
        }

        .btn-remove {
            background: var(--red-lt);
            color: var(--red);
        }

        .btn-remove:hover {
            background: var(--red);
            color: white;
        }

        /* ── Modal Overlay ───────────────────────────────────────────────── */
        #admin-edit-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 2000;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
        }

        /* When JS sets display:block, we still want it centered */
        #admin-edit-modal[style*="block"] {
            display: flex !important;
        }

        .modal-inner {
            background: var(--white);
            width: 100%;
            max-width: 460px;
            border-radius: 16px;
            padding: 36px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.18);
            animation: fadeUp 0.25s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        #admin-modal-title {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 24px;
        }

        /* ── Form Fields ─────────────────────────────────────────────────── */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--text-mid);
            margin-bottom: 7px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.92rem;
            outline: none;
            transition: border-color 0.2s;
            background: var(--white);
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--teal);
        }

        /* ── Modal Buttons ───────────────────────────────────────────────── */
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }

        #admin-edit-save-btn {
            flex: 1;
            padding: 12px;
            background: var(--teal);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.92rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }

        #admin-edit-save-btn:hover {
            background: #d96c0c;
        }

        #admin-edit-cancel-btn {
            padding: 12px 20px;
            background: #f0f0ed;
            color: var(--text-mid);
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        #admin-edit-cancel-btn:hover {
            background: #e4e4e0;
        }

        /* ── Empty State ─────────────────────────────────────────────────── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-soft);
        }

        .empty-state svg {
            margin-bottom: 16px;
            opacity: 0.35;
        }

        .empty-state p {
            font-size: 0.95rem;
        }
    </style>
    <link rel="stylesheet" href="/assets/css/main.css?v=2">
</head>
<body>

    <!-- Admin-specific navbar (dark sidebar-style) -->
    <div id="admin-header-placeholder"></div>

    <!-- ── Page hero ─────────────────────────────────────────────────────── -->
    <div class="admin-hero">
        <div class="admin-hero-inner">
            <h1>👥 User Management</h1>
            <p>View, edit roles, and remove community members.</p>
        </div>
    </div>

    <!-- ── Main content ──────────────────────────────────────────────────── -->
    <div class="admin-content">

        <!-- Status message — JS fills this in -->
        <p id="admin-status"></p>

        <!-- Toolbar -->
        <div class="admin-toolbar" style="margin-top:16px;">
            <div class="search-wrap">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                </svg>
                <!-- ID required by admin-page.js -->
                <input type="search" id="admin-search-input" placeholder="Search members by name…">
            </div>
            <span class="member-count" id="admin-member-count"></span>
            <!-- Invite button — wired by admin-page.js -->
            <button id="admin-invite-btn" class="btn-action btn-edit" style="margin-left:auto;">✉️ Invite Member</button>
        </div>

        <!-- Members table -->
        <div class="table-card">
            <!-- ID required by admin-page.js -->
            <table id="admin-user-table">
                <thead>
                    <tr>
                        <th>Member</th>
                        <th>City</th>
                        <th>Role</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <!-- JS injects <tr> rows here — do NOT add content manually -->
                <tbody id="admin-user-tbody"></tbody>
            </table>
        </div>

        <!-- ── Invite List ───────────────────────────────────────────────── -->
        <div style="margin-top:40px;">
            <h3 style="font-size:1rem; font-weight:700; margin-bottom:16px; color:var(--text-dark);">📨 Pending Invites</h3>
            <!-- ID required by admin-page.js — JS injects invite rows here -->
            <div id="admin-invite-list" class="table-card">
                <table style="width:100%; border-collapse:collapse;">
                    <thead>
                        <tr>
                            <th style="text-align:left;padding:13px 20px;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-soft);border-bottom:1px solid var(--border);background:#f5f5f3;">Email</th>
                            <th style="text-align:left;padding:13px 20px;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-soft);border-bottom:1px solid var(--border);background:#f5f5f3;">Role</th>
                            <th style="text-align:left;padding:13px 20px;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-soft);border-bottom:1px solid var(--border);background:#f5f5f3;">Status</th>
                            <th style="text-align:left;padding:13px 20px;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-soft);border-bottom:1px solid var(--border);background:#f5f5f3;">Expires</th>
                            <th style="text-align:left;padding:13px 20px;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-soft);border-bottom:1px solid var(--border);background:#f5f5f3;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="admin-invite-tbody"></tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- ── Edit Modal ─────────────────────────────────────────────────────── -->
    <!-- ID required by admin-page.js — JS toggles display:block/none -->
    <div id="admin-edit-modal">
        <div class="modal-inner">

            <!-- ID required — JS sets the user's name here -->
            <h3 id="admin-modal-title">Edit User</h3>

            <!-- ID required — JS listens to submit event -->
            <form id="admin-edit-form" novalidate>

                <!-- Hidden field — JS stores the target user's ID here -->
                <input type="hidden" id="admin-edit-userid">

                <div class="form-group">
                    <label for="admin-edit-fullname">Full Name</label>
                    <!-- ID required — JS reads and writes this field -->
                    <input type="text" id="admin-edit-fullname" placeholder="Full name">
                </div>

                <div class="form-group">
                    <label for="admin-edit-role">Role</label>
                    <!-- ID required — JS reads and writes this select -->
                    <select id="admin-edit-role">
                        <option value="member">Member</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>

                <div class="modal-actions">
                    <!-- IDs required by admin-page.js -->
                    <button type="submit"  id="admin-edit-save-btn">Save Changes</button>
                    <button type="button" id="admin-edit-cancel-btn">Cancel</button>
                </div>

            </form>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <!-- ── Invite Modal ───────────────────────────────────────────────────── -->
    <!-- ID required — JS toggles display -->
    <div id="admin-invite-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:2000;backdrop-filter:blur(4px);align-items:center;justify-content:center;">
        <div class="modal-inner">
            <h3 style="font-size:1.2rem;font-weight:800;color:var(--text-dark);margin-bottom:8px;">✉️ Invite New Member</h3>
            <p style="font-size:.85rem;color:var(--text-soft);margin-bottom:24px;">They'll receive a signup link valid for 7 days.</p>

            <!-- ID required — JS status messages inside modal -->
            <p id="invite-modal-status" style="font-size:.85rem;margin-bottom:12px;"></p>

            <form id="admin-invite-form" novalidate>
                <div class="form-group">
                    <label for="invite-email">Email Address</label>
                    <input type="email" id="invite-email" placeholder="member@example.com" required>
                </div>
                <div class="form-group">
                    <label for="invite-role">Role</label>
                    <select id="invite-role">
                        <option value="member">Member</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="submit" id="admin-invite-send-btn">Send Invite</button>
                    <button type="button" id="admin-invite-cancel-btn">Cancel</button>
                </div>
            </form>

            <!-- Invite URL shown after creation (copy link) -->
            <div id="invite-url-wrap" style="display:none;margin-top:20px;">
                <label style="font-size:.82rem;font-weight:700;color:var(--text-mid);display:block;margin-bottom:6px;">Invite Link (share this):</label>
                <div style="display:flex;gap:8px;align-items:center;">
                    <input type="text" id="invite-url-input" readonly style="flex:1;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:.82rem;background:#f8f8f6;">
                    <button type="button" id="invite-copy-btn" class="btn-action btn-edit">Copy</button>
                </div>
            </div>
        </div>
    </div>

    <!-- admin-main loads the admin navbar and handles logout -->
    <script type="module" src="/js/admin-main.js"></script>
    <script type="module" src="/js/pages/admin-page.js"></script>

</body>
</html>
