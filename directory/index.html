<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Directory | Community Hub</title>
    <meta name="description" content="Browse and connect with members of the Community Hub.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        :root {
            --teal: #f4831f;
            --teal-lt: #fff4ea;
            --saffron: #f4831f;
            --text-dark: #1e1e1e;
            --text-soft: #7a7a7a;
            --border: #e8e8e4;
            --bg: #fafaf8;
            --white: #ffffff;
            --radius: 14px;
            --shadow: 0 4px 24px rgba(0,0,0,0.07);
        }

        body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; background: var(--bg); color: var(--text-dark); line-height: 1.6; }

        /* Hero */
        .dir-hero { background: linear-gradient(135deg, #1e1e2e 0%, var(--teal) 100%); padding: 56px 0 44px; color: white; text-align: center; }
        .dir-hero h1 { font-size: clamp(1.8rem, 4vw, 2.6rem); font-weight: 800; letter-spacing: -.03em; margin-bottom: 8px; }
        .dir-hero p  { font-size: .95rem; opacity: .75; }

        /* Controls */
        .dir-controls { max-width: 900px; margin: 32px auto 0; padding: 0 24px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        #dir-search { flex: 1; min-width: 200px; padding: 10px 16px; border: 1.5px solid var(--border); border-radius: 10px; font-family: inherit; font-size: .9rem; outline: none; background: var(--white); transition: border-color .2s; }
        #dir-search:focus { border-color: var(--teal); }
        #dir-count { font-size: .82rem; color: var(--text-soft); margin-left: auto; }

        /* Grid */
        .dir-grid-wrap { max-width: 900px; margin: 28px auto 80px; padding: 0 24px; }
        #dir-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 18px; }

        /* Member card */
        .member-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: transform .2s, box-shadow .2s;
        }
        .member-card:hover { transform: translateY(-3px); box-shadow: 0 10px 36px rgba(0,0,0,.1); }

        .member-avatar {
            width: 56px; height: 56px; border-radius: 50%;
            background: linear-gradient(135deg, var(--saffron), var(--teal));
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; font-weight: 800; color: white;
            text-transform: uppercase; margin-bottom: 14px; flex-shrink: 0;
        }

        .member-name { font-size: .95rem; font-weight: 700; color: var(--text-dark); margin-bottom: 4px; }
        .member-location { font-size: .78rem; color: var(--text-soft); margin-bottom: 8px; }
        .member-bio { font-size: .78rem; color: var(--text-soft); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .member-role-badge {
            display: inline-block; margin-top: 10px;
            font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em;
            padding: 2px 10px; border-radius: 50px;
        }
        .role-admin  { background: #fff4ea; color: #f4831f; }
        .role-member { background: var(--teal-lt); color: var(--teal); }

        /* Status */
        #dir-status { max-width: 900px; margin: 16px auto 0; padding: 0 24px; font-size: .9rem; }

        /* Shimmer */
        .shimmer {
            height: 170px; border-radius: var(--radius);
            background: linear-gradient(90deg, #f0f0ed 25%, #e8e8e5 50%, #f0f0ed 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

        @media (max-width: 600px) { .dir-controls, .dir-grid-wrap { padding: 0 16px; } #dir-grid { grid-template-columns: 1fr; } }
    </style>
    <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <div class="dir-hero">
        <h1>👥 Member Directory</h1>
        <p>Connect with members of our community</p>
    </div>

    <div class="dir-controls">
        <!--
            IDs used by directory-page.js:
              #dir-search  — live search input
              #dir-count   — "X members" label
        -->
        <input type="search" id="dir-search" placeholder="🔍  Search by name or city…">
        <span id="dir-count"></span>
    </div>

    <div id="dir-status"></div>

    <div class="dir-grid-wrap">
        <!--
            #dir-grid — JS injects .member-card elements here
            Do NOT add content manually.
        -->
        <div id="dir-grid"></div>
    </div>

    <div id="footer-placeholder"></div>

    <script type="module" src="/js/main.js"></script>
    <script type="module" src="/js/pages/directory-page.js"></script>

</body>
</html>
