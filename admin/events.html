<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – Events | Community Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --saffron: #f4831f;
            --teal: #f4831f;
            --teal-lt: #fff4ea;
            --text-dark: #1e1e1e;
            --text-mid: #4a4a4a;
            --text-soft: #7a7a7a;
            --border: #e8e8e4;
            --bg: #fafaf8;
            --white: #ffffff;
            --red: #e53935;
            --red-lt: #ffebee;
            --blue-lt: #e3f0ff;
            --blue: #1976d2;
            --green: #2e7d32;
            --green-lt: #e8f5e9;
            --radius: 12px;
            --shadow: 0 4px 24px rgba(0,0,0,0.07);
        }

        body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; background: var(--bg); color: var(--text-dark); line-height: 1.6; }

        /* ── Hero ──────────────────────────────────────────────────────────── */
        .admin-hero { background: linear-gradient(135deg, var(--teal) 0%, #1a5c53 100%); padding: 48px 0 36px; color: white; }
        .admin-hero-inner { max-width: 1200px; margin: 0 auto; padding: 0 32px; }
        .admin-hero-inner h1 { font-size: 1.9rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 6px; }
        .admin-hero-inner p { font-size: .95rem; opacity: .8; }

        /* ── Content ───────────────────────────────────────────────────────── */
        .admin-content { max-width: 1200px; margin: 40px auto; padding: 0 32px 80px; }

        /* ── Status ────────────────────────────────────────────────────────── */
        #admin-event-status { font-size: .88rem; font-weight: 600; padding: 10px 16px; border-radius: 8px; min-height: 38px; transition: all .3s; }
        .event-status-info    { background: var(--blue-lt);  color: var(--blue);  }
        .event-status-success { background: var(--green-lt); color: var(--green); }
        .event-status-error   { background: var(--red-lt);   color: var(--red);   }
        .event-status-        { display: none; }

        /* ── Toolbar ───────────────────────────────────────────────────────── */
        .admin-toolbar { display: flex; align-items: center; gap: 12px; margin: 16px 0 20px; flex-wrap: wrap; }
        #admin-event-count { font-size: .85rem; color: var(--text-soft); margin-left: auto; }

        /* ── Table card ─────────────────────────────────────────────────────── */
        .table-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
        #admin-events-table { width: 100%; border-collapse: collapse; }
        #admin-events-table thead tr { background: #f5f5f3; }
        #admin-events-table th { text-align:left; padding: 13px 20px; font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text-soft); border-bottom: 1px solid var(--border); }
        #admin-events-table td { padding: 14px 20px; font-size: .9rem; border-bottom: 1px solid #f0f0ed; color: var(--text-mid); }
        #admin-events-table tbody tr:hover { background: #fafaf8; }
        #admin-events-table tbody tr:last-child td { border-bottom: none; }

        /* Status badges */
        .status-badge { display:inline-block; padding:3px 12px; border-radius:50px; font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; }
        .status-active    { background: var(--green-lt); color: var(--green); }
        .status-cancelled { background: var(--red-lt);   color: var(--red);   }
        .status-draft     { background: #f5f5f5; color: #777; }

        /* Action buttons */
        .btn-action { display:inline-flex; align-items:center; gap:5px; padding:6px 14px; border-radius:8px; font-family:inherit; font-size:.8rem; font-weight:600; border:none; cursor:pointer; transition:all .2s; }
        .btn-edit   { background: var(--blue-lt); color: var(--blue);  margin-right:6px; }
        .btn-remove { background: var(--red-lt);  color: var(--red);  }
        .btn-edit:hover   { background: var(--blue); color: white; }
        .btn-remove:hover { background: var(--red);  color: white; }
        .btn-primary { background: var(--teal); color: white; padding: 10px 20px; border-radius: 10px; font-family:inherit; font-size:.9rem; font-weight:700; border:none; cursor:pointer; transition:background .2s; }
        .btn-primary:hover { background: #d96c0c; }

        /* ── Pagination ─────────────────────────────────────────────────────── */
        .events-pagination { display:flex; align-items:center; justify-content:center; gap:12px; margin-top:30px; }
        #admin-events-prev-btn, #admin-events-next-btn { padding:10px 24px; border-radius:10px; font-family:inherit; font-size:.875rem; font-weight:700; border:1.5px solid var(--border); background:var(--white); cursor:pointer; transition:all .2s; }
        #admin-events-prev-btn:disabled, #admin-events-next-btn:disabled { opacity:.35; cursor:not-allowed; }
        #admin-events-prev-btn:hover:not(:disabled), #admin-events-next-btn:hover:not(:disabled) { border-color:var(--teal); color:var(--teal); }

        /* ── Modal ──────────────────────────────────────────────────────────── */
        #admin-event-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:2000; backdrop-filter:blur(4px); align-items:center; justify-content:center; }
        #admin-event-modal[style*="flex"] { display:flex !important; }
        .modal-inner { background:var(--white); width:100%; max-width:540px; border-radius:16px; padding:36px; box-shadow:0 24px 80px rgba(0,0,0,.18); animation:fadeUp .25s ease; max-height:90vh; overflow-y:auto; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
        #admin-event-modal-title { font-size:1.2rem; font-weight:800; color:var(--text-dark); margin-bottom:24px; }
        .form-group { margin-bottom:18px; }
        .form-group label { display:block; font-size:.82rem; font-weight:700; color:var(--text-mid); margin-bottom:7px; text-transform:uppercase; letter-spacing:.05em; }
        .form-group input, .form-group select, .form-group textarea { width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:10px; font-family:inherit; font-size:.92rem; outline:none; transition:border-color .2s; background:var(--white); }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:var(--teal); }
        .form-group textarea { resize:vertical; min-height:90px; }
        .modal-actions { display:flex; gap:10px; margin-top:24px; }
        #admin-event-save-btn { flex:1; padding:12px; background:var(--teal); color:white; border:none; border-radius:10px; font-family:inherit; font-size:.92rem; font-weight:700; cursor:pointer; transition:background .2s; }
        #admin-event-save-btn:hover { background:#d96c0c; }
        #admin-event-cancel-btn { padding:12px 20px; background:#f0f0ed; color:var(--text-mid); border:none; border-radius:10px; font-family:inherit; font-size:.92rem; font-weight:600; cursor:pointer; }
        #admin-event-cancel-btn:hover { background:#e4e4e0; }
    </style>
    <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>

    <!-- Admin navbar -->
    <div id="admin-header-placeholder"></div>

    <!-- Hero -->
    <div class="admin-hero">
        <div class="admin-hero-inner">
            <h1>📅 Event Management</h1>
            <p>Create, edit, and manage all community events.</p>
        </div>
    </div>

    <!-- Main content -->
    <div class="admin-content">

        <!-- Status message — JS fills this -->
        <p id="admin-event-status"></p>

        <!-- Toolbar: Create button + sort + count -->
        <div class="admin-toolbar" style="margin-top:16px;">
            <!-- ID required — opens create modal -->
            <button id="admin-create-event-btn" class="btn-primary">＋ Create Event</button>

            <select id="admin-events-sort" style="padding:9px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:.875rem;font-weight:600;background:var(--white);outline:none;">
                <option value="asc">Earliest First</option>
                <option value="desc">Latest First</option>
            </select>

            <span id="admin-event-count" style="margin-left:auto;font-size:.85rem;color:var(--text-soft);"></span>
        </div>

        <!-- Events table -->
        <div class="table-card">
            <table id="admin-events-table">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Date</th>
                        <th>Location</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <!-- JS injects <tr> rows here — do NOT add content manually -->
                <tbody id="admin-events-tbody"></tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="events-pagination">
            <button id="admin-events-prev-btn" disabled>← Previous</button>
            <span id="admin-events-page-info" style="font-size:.85rem;color:var(--text-soft);"></span>
            <button id="admin-events-next-btn" disabled>Next →</button>
        </div>

    </div>

    <!-- ── Create / Edit Event Modal ─────────────────────────────────────────── -->
    <!-- JS toggles display between none/flex -->
    <div id="admin-event-modal">
        <div class="modal-inner">

            <!-- JS sets this to "Create Event" or "Edit Event" -->
            <h3 id="admin-event-modal-title">Create Event</h3>

            <form id="admin-event-form" novalidate>

                <!-- Hidden — empty on create, holds ID on edit -->
                <input type="hidden" id="event-form-id">

                <div class="form-group">
                    <label for="event-form-title">Title *</label>
                    <input type="text" id="event-form-title" placeholder="Event name" required>
                </div>

                <div class="form-group">
                    <label for="event-form-description">Description</label>
                    <textarea id="event-form-description" placeholder="What is this event about?"></textarea>
                </div>

                <div class="form-group">
                    <label for="event-form-image">Banner Image (Max 5MB)</label>
                    <input type="file" id="event-form-image" accept="image/*">
                    <p style="font-size: 0.75rem; color: var(--text-soft); margin-top: 4px;">Leave empty to keep existing image</p>
                </div>

                <div class="form-group">
                    <label for="event-form-date">Date & Time *</label>
                    <input type="datetime-local" id="event-form-date" required>
                </div>

                <div class="form-group">
                    <label for="event-form-location">Location</label>
                    <input type="text" id="event-form-location" placeholder="City, venue, or online link">
                </div>

                <div class="form-group">
                    <label for="event-form-status">Status</label>
                    <select id="event-form-status">
                        <option value="active">Active</option>
                        <option value="draft">Draft</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>

                <div class="modal-actions" style="flex-wrap:wrap; gap:8px;">
                    <!-- ID required — validation/save status inside modal -->
                    <p id="event-form-modal-status" style="display:none;font-size:.85rem;width:100%;margin-bottom:4px;"></p>
                    <button type="submit" id="admin-event-save-btn">Save Event</button>
                    <button type="button" id="admin-event-cancel-btn">Cancel</button>
                </div>

            </form>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script type="module" src="/js/admin-main.js"></script>
    <script type="module" src="/js/pages/admin-events-page.js"></script>

</body>
</html>
